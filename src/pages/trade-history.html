<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CSBOARD - Trade History</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1b2838; color: #c6d4df; font-family: Arial, Helvetica, sans-serif; min-width: 800px; padding: 20px; }
    h1 { color: #fff; font-size: 22px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
    h1 .logo { color: #4f8ef7; font-weight: bold; }
    h1 .summary { margin-left: auto; font-size: 14px; color: #8bb9e0; }
    .summary .profit { color: #5cb85c; }
    .summary .loss { color: #d9534f; }

    .controls { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
    .controls label { color: #8bb9e0; font-size: 13px; display: flex; align-items: center; gap: 6px; }
    .controls select, .controls input { background: #2a475e; border: 1px solid #4b8cbe; color: #c6d4df; padding: 4px 8px; border-radius: 3px; }
    .controls button { background: #3d6896; border: 1px solid #4b8cbe; color: #fff; padding: 5px 14px; border-radius: 3px; cursor: pointer; font-size: 13px; }
    .controls button:hover { background: #4b8cbe; }

    .trade { background: #1c2125; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; margin-bottom: 12px; padding: 14px; }
    .trade-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .trade-header .index { color: #4f8ef7; font-weight: bold; }
    .trade-header .partner { color: #fff; }
    .trade-header .partner a { color: #4f8ef7; text-decoration: none; }
    .trade-header .date { margin-left: auto; color: #666; font-size: 12px; }

    .trade-sides { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: start; }
    .side-label { text-align: center; font-size: 11px; font-weight: bold; margin-bottom: 6px; }
    .side-label.given { color: #d9534f; }
    .side-label.received { color: #5cb85c; }

    .items { display: flex; flex-wrap: wrap; gap: 6px; }
    .item { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.03); border-radius: 4px; padding: 4px 8px; }
    .item img { width: 48px; height: 48px; border-radius: 3px; }
    .item-info { display: flex; flex-direction: column; }
    .item-name { font-size: 11px; color: #c6d4df; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .item-price { font-size: 11px; color: #8bb9e0; }

    .exchange { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
    .exchange-icon { font-size: 24px; }
    .exchange-icon.profit { color: #5cb85c; }
    .exchange-icon.loss { color: #d9534f; }
    .exchange-icon.neutral { color: #666; }
    .pl-value { font-size: 14px; font-weight: bold; margin-top: 4px; }
    .pl-value.profit { color: #5cb85c; }
    .pl-value.loss { color: #d9534f; }
    .pl-pct { font-size: 11px; color: #8bb9e0; }
    .totals { display: flex; justify-content: space-between; margin-top: 8px; font-size: 12px; }
    .totals .given-total { color: #d9534f; }
    .totals .received-total { color: #5cb85c; }

    .load-more { text-align: center; margin: 16px 0; }
    .load-more button { background: #3d6896; border: 1px solid #4b8cbe; color: #fff; padding: 8px 24px; border-radius: 4px; cursor: pointer; font-size: 14px; }
    .spinner { text-align: center; padding: 40px; color: #8bb9e0; }
    .error { text-align: center; padding: 20px; color: #d9534f; }
  </style>
</head>
<body>
  <h1>
    <span class="logo">CSBOARD</span> Trade History
    <span class="summary" id="summary"></span>
  </h1>
  <div class="controls">
    <label>Per page:
      <select id="pageSize">
        <option value="25">25</option>
        <option value="50" selected>50</option>
        <option value="100">100</option>
      </select>
    </label>
    <label>
      <input type="checkbox" id="excludeEmpty" checked> Hide empty trades
    </label>
    <button id="refreshBtn">Refresh</button>
    <button id="loadMoreBtn" style="display:none">Load More...</button>
  </div>
  <div id="trades"><div class="spinner">Loading trade history...</div></div>

  <script src="trade-history-page.js"></script>
</body>
</html>
